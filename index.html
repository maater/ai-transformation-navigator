<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-First Transformation Navigator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1a1a2e;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:12px}
h1{font-size:18px;font-weight:700;margin-bottom:2px}
.sub{font-size:11px;color:#999;margin-bottom:10px}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:10px 12px;margin-bottom:8px}
.card-label{font-size:10px;font-weight:600;color:#888;margin-bottom:5px}
.btn-row{display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:4px 10px;border-radius:14px;border:1.5px solid #ddd;background:#fff;color:#555;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:#aaa}
.btn.on{background:#6366f1;color:#fff;border-color:#6366f1}
.btn.on-y{background:#f59e0b;color:#fff;border-color:#f59e0b}
.filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.legend{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.legend span{font-size:9px;color:#999}
.main{display:flex;gap:10px}
.map-wrap{flex:1 1 auto;min-width:0}
.panel{width:340px;flex-shrink:0;max-height:540px;overflow-y:auto}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.strat-box{margin-top:6px;padding:7px 9px;background:#eef2ff;border-radius:7px;font-size:11px;color:#3730a3;line-height:1.45}
.detail-card{padding:12px;border-radius:8px;border-width:2px;border-style:solid;font-size:11px}
.detail-card h3{font-size:13px;line-height:1.3}
.tag{padding:1px 6px;border-radius:6px;font-size:8px;font-weight:600;display:inline-block;margin-right:3px;margin-bottom:3px}
.best-box{padding:5px 7px;border-radius:5px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06);margin:6px 0}
.best-box .label{font-size:8px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:2px}
.best-box .val{font-size:10px;color:#333;line-height:1.4}
.mig-link{font-size:10px;color:#6366f1;cursor:pointer;text-decoration:underline;margin-bottom:2px}
.mig-from{font-size:10px;color:#999;margin-bottom:2px}
.action-section{margin-bottom:8px}
.action-title{font-weight:700;color:#6366f1;font-size:10px;margin-bottom:2px}
.action-item{color:#444;padding-left:12px;font-size:10px;line-height:1.5}
.tl-box{margin-top:8px;padding:8px 10px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0}
.tl-phase{font-weight:700;color:#15803d;font-size:10px}
.tl-desc{color:#166534;font-size:10px;line-height:1.4;padding-left:8px;margin-bottom:5px}
.empty-panel{padding:20px;border-radius:8px;border:2px dashed #e2e8f0;text-align:center;color:#bbb;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.compare-header{padding:6px 8px;background:#fffbeb;border-radius:6px;border:1px solid #f59e0b;font-size:10px;color:#92400e;margin-bottom:8px}
.compare-card{padding:10px;border-radius:8px;border-width:2px;border-style:solid;background:#fff;font-size:11px;margin-bottom:8px}
@media(max-width:800px){.main{flex-direction:column}.panel{width:100%;max-height:none}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script src="js/data.js"></script>
<script src="js/helpers.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
</body>
</html>
