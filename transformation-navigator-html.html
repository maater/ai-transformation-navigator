{from:25,to:15,reasoning:"Platforms own operational data. Outcome delivery with that context = contextual engine.",actions:{team:["AI product team for merchant intelligence","Domain experts for outcomes","Platform eng → AI orchestration"],gtm:["From 'build on us' to 'we grow your business'","AI services as premium tier","Outcome-based pricing"],ops:["Context models from platform data","AI agents acting on customer's behalf","Progressive autonomy: suggest → approve → auto"],finance:["Venture-scale endgame: $50M+ rounds","Platform fees → outcome-based revenue","Massive TAM expansion"],timeline:{m1_3:"AI suggestions from data patterns",m4_6:"AI actions with approval (semi-autonomous)",m7_12:"Fully autonomous for proven use cases"}}},
{from:26,to:16,reasoning:"Data providers evolve from static access to dynamic, continuously maintained context fabric.",actions:{team:["AI engineers for contextual modeling","Real-time data integration team","Data analysts → context engineers"],gtm:["From 'access data' to 'maintain your context'","Price on freshness and integration depth","Target those drowning in fragmented info"],ops:["Real-time integration with customer systems","Adaptive models learning decision patterns","Proactive alerting — push, don't wait"],finance:["Self-fundable from subscriptions","Context broker at 2-3x current pricing","May raise $10-20M to accelerate"],timeline:{m1_3:"Real-time integration prototype, 3-5 customers",m4_6:"Proactive intelligence, test new pricing",m7_12:"Full context broker for early adopters"}}},
{from:27,to:19,reasoning:"API providers commoditizing evolve into embedded intelligence inside other products.",actions:{team:["Partnerships/BD team","Integration engineers for embedding","General API → vertical fine-tuning"],gtm:["From 'use our API' to 'we power your AI'","Price on value through partners","Target platforms needing AI outcomes"],ops:["White-label deployment infra","Partner-specific fine-tuning","SLAs and monitoring for embedded"],finance:["High-volume, lower-margin","Venture-scale in major platforms: $20M+","Revenue tied to partner growth"],timeline:{m1_3:"2-3 embedded partnerships, framework",m4_6:"Scale deployments, partner metrics",m7_12:"Embedded revenue ≥ direct API revenue"}}}
];

const FP=[
{id:"consultancy",label:"Consultancy / Agency",icon:"🧑‍💼",cur:[1,7,8],tgt:[9,10,18,20,22],advice:"Your relationships and domain knowledge are your moat — but delivery is being commoditized. Keep the human interface for trust, replace delivery with AI. Stop selling hours, start selling outcomes."},
{id:"devshop",label:"Dev / Software Shop",icon:"💻",cur:[4,11],tgt:[12,20,17],advice:"Building software is commoditizing fastest. Specialize in a vertical and productize, or stop building tools and operate the outcomes. 'Build and handover' has ~18 months."},
{id:"saas",label:"SaaS Product",icon:"📦",cur:[3,5,6,24],tgt:[13,14,15,12],advice:"Your customers accepted your tool because custom was too expensive. AI changes that. Evolve from 'here's a tool' to 'here's the outcome.' Your data and domain logic are your head start."},
{id:"data",label:"Data / Analytics Co",icon:"📊",cur:[7,26],tgt:[16,15,20],advice:"You're sitting on the most valuable AI-era asset: context. Evolve from selling data access to maintaining a living orientation fabric."},
{id:"platform",label:"Platform / Marketplace",icon:"🏗️",cur:[25,23],tgt:[15,17],advice:"You own the customer's operational data. Use it to progressively do what they do manually. Every config/interpret step is an AI outcome opportunity."},
{id:"starting",label:"Starting from Scratch",icon:"🚀",cur:[],tgt:[9,10,12,20,16],advice:"No legacy — that's your advantage. Start delivering outcomes via human interface (agency), acquire context each engagement, then automate. Services wedge = revenue + context + product insight."},
{id:"freelancer",label:"Freelancer / Solo",icon:"🎯",cur:[1,4],tgt:[18,22,9],advice:"Your expertise doesn't scale. Three paths: guild (share AI infra), premium-artisanal (charge more for human), or AI-first agency (agency outcomes solo)."}
];

const SC={legacy:{c:"#ef4444",bg:"#fef2f2",l:"Legacy"},current:{c:"#f59e0b",bg:"#fffbeb",l:"Current"},emerging:{c:"#22c55e",bg:"#f0fdf4",l:"Emerging"},frontier:{c:"#8b5cf6",bg:"#f5f3ff",l:"Frontier"}};
const II={human:"🧑",gui:"🖥️",hybrid:"🔀",none:"👻"};
const PL={project:"Project",retainer:"Retainer",subscription:"Subscription",outcome:"Outcome-based"};
const PC={revenue:"#3b82f6",efficiency:"#10b981",capability:"#f59e0b"};
const AI={team:"👥",gtm:"📣",ops:"⚙️",finance:"💰"};
const AL={team:"Team",gtm:"Go-to-Market",ops:"Operations",finance:"Finance"};
const TL={m1_3:"Months 1-3",m4_6:"Months 4-6",m7_12:"Months 7-12"};

let state={sel:null,arrow:null,pf:"all",fp:null,arrows:true,compare:false,comp:[]};

function gm(id){return M.find(m=>m.id===id)}
function prof(){return state.fp?FP.find(f=>f.id===state.fp):null}
function visMig(){
  const p=prof();
  if(!state.arrows)return[];
  if(!p)return MIG;
  return MIG.filter(m=>p.cur.includes(m.from)||p.tgt.includes(m.to));
}
function compMig(){
  const p=prof();if(!p)return[];
  return MIG.filter(m=>p.cur.includes(m.from)&&p.tgt.includes(m.to));
}
function filtered(){return M.filter(m=>state.pf==="all"||m.problems.includes(state.pf))}
function isHL(id){const p=prof();return!p||p.cur.includes(id)||p.tgt.includes(id)}
function isCN(id){const p=prof();return p&&p.cur.includes(id)}
function isTN(id){const p=prof();return p&&p.tgt.includes(id)}

const W=660,H=460,PD={l:48,r:22,t:22,b:42};
function tx(x){return PD.l+(x/100)*(W-PD.l-PD.r)}
function ty(y){return PD.t+((100-y)/100)*(H-PD.t-PD.b)}

function render(){
  const p=prof(),f=filtered(),fids=new Set(f.map(m=>m.id)),vm=visMig(),cm=compMig();
  const sm=state.sel?gm(state.sel):null;
  const sa=state.arrow!==null?vm[state.arrow]:null;

  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;background:#fafbfc;border-radius:8px;border:1px solid #e5e7eb">
<defs><marker id="a1" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#a78bfa"/></marker>
<marker id="a2" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#6366f1"/></marker>
<marker id="a3" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#f59e0b"/></marker></defs>`;
  [0,25,50,75,100].forEach(v=>{svg+=`<line x1="${tx(v)}" y1="${PD.t}" x2="${tx(v)}" y2="${H-PD.b}" stroke="#f0f0f0" stroke-width=".5"/><line x1="${PD.l}" y1="${ty(v)}" x2="${W-PD.r}" y2="${ty(v)}" stroke="#f0f0f0" stroke-width=".5"/>`;});
  svg+=`<text x="${PD.l+2}" y="${H-6}" font-size="8" fill="#ccc">← Human Delivery</text>`;
  svg+=`<text x="${W-PD.r}" y="${H-6}" font-size="8" fill="#ccc" text-anchor="end">AI Delivery →</text>`;
  svg+=`<text x="${W/2}" y="${H-4}" font-size="8" fill="#bbb" text-anchor="middle" font-weight="600">DELIVERY BLEND</text>`;
  svg+=`<text x="6" y="${H/2}" font-size="8" fill="#bbb" text-anchor="middle" font-weight="600" transform="rotate(-90,6,${H/2})">CONTEXT ACQUISITION</text>`;

  vm.forEach((m,i)=>{
    const fr=gm(m.from),to=gm(m.to);
    if(!fr||!to||!fids.has(fr.id)||!fids.has(to.id))return;
    const x1=tx(fr.x),y1=ty(fr.y),x2=tx(to.x),y2=ty(to.y);
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),nx=dx/len,ny=dy/len;
    const isSel=state.arrow===i,isC=state.comp.includes(i);
    const dim=p&&!(p.cur.includes(m.from)&&p.tgt.includes(m.to));
    svg+=`<line x1="${x1+nx*12}" y1="${y1+ny*12}" x2="${x2-nx*12}" y2="${y2-ny*12}" stroke="transparent" stroke-width="14" style="cursor:pointer" data-arrow="${i}"/>`;
    const col=isC?"#f59e0b":isSel?"#6366f1":"#c4b5fd";
    const sw=isSel||isC?2.5:1;
    const mk=isC?"url(#a3)":isSel?"url(#a2)":"url(#a1)";
    const op=dim?0.15:(isSel||isC?1:0.4);
    svg+=`<line x1="${x1+nx*12}" y1="${y1+ny*12}" x2="${x2-nx*12}" y2="${y2-ny*12}" stroke="${col}" stroke-width="${sw}" marker-end="${mk}" opacity="${op}" style="pointer-events:none"/>`;
  });

  f.forEach(m=>{
    const cx=tx(m.x),cy=ty(m.y),sc=SC[m.status];
    const isSel=state.sel===m.id,dim=p&&!isHL(m.id);
    const op=dim?0.12:1;
    svg+=`<g data-node="${m.id}" style="cursor:${state.compare?'default':'pointer'}" opacity="${op}">`;
    if(isCN(m.id))svg+=`<circle cx="${cx}" cy="${cy}" r="15" fill="none" stroke="#6366f1" stroke-width="2.5"/>`;
    if(isTN(m.id))svg+=`<circle cx="${cx}" cy="${cy}" r="15" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>`;
    svg+=`<circle cx="${cx}" cy="${cy}" r="${isSel?11:9}" fill="${isSel?sc.c:sc.bg}" stroke="${sc.c}" stroke-width="${isSel?2:1.5}"/>`;
    svg+=`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="8">${II[m.iface]}</text>`;
    svg+=`<foreignObject x="${cx-40}" y="${cy+12}" width="80" height="26" style="pointer-events:none;overflow:visible"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;font-weight:600;color:${dim?'#ddd':'#555'};text-align:center;line-height:1.2">${m.name}</div></foreignObject>`;
    svg+=`</g>`;
  });
  svg+=`</svg>`;

  // Panel
  let panel='';
  if(state.compare&&state.comp.length>0){
    const colors=["#6366f1","#22c55e","#f59e0b"];
    panel=`<div class="compare-header">⚖️ <strong>Comparing ${state.comp.length} path${state.comp.length>1?'s':''}</strong> — click arrows to add/remove (max 3)</div>`;
    state.comp.forEach((idx,ci)=>{
      const m=vm[idx];if(!m)return;
      const fr=gm(m.from),to=gm(m.to),col=colors[ci];
      panel+=`<div class="compare-card" style="border-color:${col}"><div style="font-weight:700;color:${col};margin-bottom:4px;font-size:12px">${fr.name} → ${to.name}</div>`;
      panel+=`<p style="color:#555;line-height:1.4;margin:0 0 8px">${m.reasoning}</p>`;
      Object.entries(m.actions).filter(([k])=>k!=='timeline').forEach(([k,v])=>{
        panel+=`<div style="margin-bottom:6px"><div style="font-weight:600;color:#888;font-size:9px">${AI[k]} ${AL[k]}</div>`;
        v.forEach(a=>{panel+=`<div style="color:#444;padding-left:10px;font-size:10px;line-height:1.4">• ${a}</div>`;});
        panel+=`</div>`;
      });
      panel+=`<div style="margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:6px"><div style="font-weight:600;color:#888;font-size:9px;margin-bottom:4px">📅 Timeline</div>`;
      Object.entries(m.actions.timeline).forEach(([k,v])=>{
        panel+=`<div style="margin-bottom:4px"><span style="font-weight:600;color:${col};font-size:9px">${TL[k]}: </span><span style="color:#444;font-size:10px">${v}</span></div>`;
      });
      panel+=`</div></div>`;
    });
  } else if(sa){
    const fr=gm(sa.from),to=gm(sa.to);
    panel=`<div class="detail-card" style="border-color:#6366f1;background:#fff">`;
    panel+=`<div style="font-size:9px;font-weight:700;color:#6366f1;text-transform:uppercase;margin-bottom:4px">Migration Path</div>`;
    panel+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;flex-wrap:wrap">`;
    panel+=`<span style="padding:2px 6px;border-radius:6px;background:${SC[fr.status].bg};border:1px solid ${SC[fr.status].c};font-size:10px;font-weight:600">${fr.name}</span>`;
    panel+=`<span style="color:#6366f1;font-weight:700;font-size:11px">→</span>`;
    panel+=`<span style="padding:2px 6px;border-radius:6px;background:${SC[to.status].bg};border:1px solid ${SC[to.status].c};font-size:10px;font-weight:600">${to.name}</span></div>`;
    panel+=`<p style="color:#555;line-height:1.4;margin:0 0 10px;font-size:11px">${sa.reasoning}</p>`;
    panel+=`<div style="font-size:9px;font-weight:700;color:#333;text-transform:uppercase;margin-bottom:6px;border-top:1px solid #e5e7eb;padding-top:8px">Action Plan</div>`;
    Object.entries(sa.actions).filter(([k])=>k!=='timeline').forEach(([k,v])=>{
      panel+=`<div class="action-section"><div class="action-title">${AI[k]} ${AL[k]}</div>`;
      v.forEach(a=>{panel+=`<div class="action-item">• ${a}</div>`;});
      panel+=`</div>`;
    });
    panel+=`<div class="tl-box"><div style="font-weight:700;color:#166534;font-size:10px;margin-bottom:6px">📅 Transformation Timeline</div>`;
    Object.entries(sa.actions.timeline).forEach(([k,v])=>{
      panel+=`<div class="tl-phase">${TL[k]}</div><div class="tl-desc">${v}</div>`;
    });
    panel+=`</div></div>`;
  } else if(sm){
    const sc=SC[sm.status];
    panel=`<div class="detail-card" style="border-color:${sc.c};background:${sc.bg}">`;
    panel+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">`;
    panel+=`<h3 style="margin:0">${sm.name}</h3>`;
    panel+=`<span class="tag" style="background:${sc.c};color:#fff;white-space:nowrap;margin-left:4px">${sc.l}</span></div>`;
    panel+=`<div style="font-size:10px;color:#888;margin-bottom:4px;font-style:italic">${sm.subtitle}</div>`;
    panel+=`<div style="font-size:10px;color:#666;margin-bottom:6px">${sm.examples}</div>`;
    panel+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">`;
    sm.problems.forEach(pr=>{panel+=`<span class="tag" style="background:${PC[pr]};color:#fff">${pr}</span>`;});
    panel+=`<span class="tag" style="background:#f1f5f9;color:#666">${II[sm.iface]} ${sm.iface}</span>`;
    panel+=`<span class="tag" style="background:#f1f5f9;color:#666">💰 ${PL[sm.pricing]}</span>`;
    panel+=`<span class="tag" style="background:#f1f5f9;color:#666">🎭 ${sm.archetype}</span></div>`;
    panel+=`<p style="font-size:10px;color:#444;line-height:1.5;margin:0 0 6px">${sm.description}</p>`;
    panel+=`<div class="best-box"><div class="label">Best suited for</div><div class="val">${sm.bestFor}</div></div>`;
    const outs=MIG.filter(a=>a.from===sm.id),ins=MIG.filter(a=>a.to===sm.id);
    if(outs.length||ins.length){
      panel+=`<div style="font-size:8px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:3px">Migration paths</div>`;
      outs.forEach(a=>{const to=gm(a.to);const mi=vm.indexOf(a);panel+=`<div class="mig-link" data-miglink="${mi}">→ ${to.name}</div>`;});
      ins.forEach(a=>{const fr=gm(a.from);panel+=`<div class="mig-from">← from ${fr.name}</div>`;});
    }
    panel+=`</div>`;
  } else {
    panel=`<div class="empty-panel"><div style="font-size:24px">🧭</div><div style="font-size:11px">Select your context above, then click nodes or arrows to explore</div><div style="font-size:9px;color:#ddd">27 models · 24 migration paths · action plans & timelines</div></div>`;
  }

  // Founder buttons
  let fpHTML=`<div class="card"><div class="card-label">I'm currently running a...</div><div class="btn-row">`;
  FP.forEach(f=>{fpHTML+=`<button class="btn${state.fp===f.id?' on':''}" data-fp="${f.id}">${f.icon} ${f.label}</button>`;});
  fpHTML+=`</div>`;
  if(p)fpHTML+=`<div class="strat-box"><strong>Strategy:</strong> ${p.advice}</div>`;
  fpHTML+=`</div>`;

  // Filters
  let fHTML=`<div class="filter-row"><div class="btn-row">`;
  [["all","All","#666"],["revenue","Revenue",PC.revenue],["efficiency","Efficiency",PC.efficiency],["capability","Capability",PC.capability]].forEach(([k,l,c])=>{
    const on=state.pf===k;
    fHTML+=`<button class="btn" data-pf="${k}" style="${on?`background:${c};color:#fff;border-color:${c}`:''}">${l}</button>`;
  });
  fHTML+=`</div>`;
  fHTML+=`<button class="btn${state.arrows?' on':''}" data-toggle="arrows">↗ Arrows</button>`;
  if(p&&cm.length>1)fHTML+=`<button class="btn${state.compare?' on-y':''}" data-toggle="compare">⚖️ Compare Paths</button>`;
  fHTML+=`<div class="legend">`;
  Object.entries(SC).forEach(([k,v])=>{fHTML+=`<span><span class="legend-dot" style="background:${v.c}"></span> ${v.l}</span>`;});
  fHTML+=`</div></div>`;

  document.getElementById('app').innerHTML=`
    <h1>AI-First Transformation Navigator</h1>
    <p class="sub">Select your context → see where you are & where to go → explore action plans for each migration path</p>
    ${fpHTML}${fHTML}
    <div class="main"><div class="map-wrap">${svg}</div><div class="panel">${panel}</div></div>`;

  // Events
  document.querySelectorAll('[data-fp]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.fp;state.fp=state.fp===id?null:id;state.sel=null;state.arrow=null;state.compare=false;state.comp=[];render();
  });
  document.querySelectorAll('[data-pf]').forEach(el=>el.onclick=()=>{state.pf=el.dataset.pf;render();});
  document.querySelector('[data-toggle="arrows"]')&&(document.querySelector('[data-toggle="arrows"]').onclick=()=>{state.arrows=!state.arrows;render();});
  document.querySelector('[data-toggle="compare"]')&&(document.querySelector('[data-toggle="compare"]').onclick=()=>{state.compare=!state.compare;state.comp=[];state.arrow=null;state.sel=null;render();});
  document.querySelectorAll('[data-arrow]').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.arrow;
    if(state.compare){
      if(state.comp.includes(i))state.comp=state.comp.filter(x=>x!==i);
      else if(state.comp.length<3)state.comp.push(i);
    }else{state.arrow=state.arrow===i?null:i;state.sel=null;}
    render();
  });
  document.querySelectorAll('[data-node]').forEach(el=>el.onclick=()=>{
    if(state.compare)return;
    const id=+el.dataset.node;state.sel=state.sel===id?null:id;state.arrow=null;render();
  });
  document.querySelectorAll('[data-miglink]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();const i=+el.dataset.miglink;if(i>=0){state.arrow=i;state.sel=null;render();}
  });
}

render();
</script>
</body>
</html>
